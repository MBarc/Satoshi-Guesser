name: Test Discord Webhook

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Send test Discord message
        run: |
          node --input-type=module <<'EOF'
          import { toWIF, deriveAddress } from './src/crypto.js';
          import { notifyHit } from './src/notify.js';

          // Private key 1 — the lowest valid key, well-known in Bitcoin circles
          const privKey = new Uint8Array(32);
          privKey[31] = 1;

          const { privKeyHex, address: addressUncompressed } = deriveAddress(privKey);
          const wifCompressed = toWIF(privKey, true);
          const wifUncompressed = toWIF(privKey, false);

          const webhookUrl = process.env.WEBHOOK_URL;
          if (!webhookUrl) { console.error('WEBHOOK_URL secret not set'); process.exit(1); }

          // Reuse notify.js but prefix the content to make clear it's a test
          const originalFetch = globalThis.fetch;
          globalThis.fetch = async (url, opts) => {
            const body = JSON.parse(opts.body);
            body.content = '[TEST] ' + body.content;
            if (body.embeds?.[0]?.footer) {
              body.embeds[0].footer.text = 'TEST MESSAGE — using private key #1, not a real hit. ' + body.embeds[0].footer.text;
            }
            opts.body = JSON.stringify(body);
            return originalFetch(url, opts);
          };

          await notifyHit(privKeyHex, addressUncompressed, wifUncompressed, wifCompressed);
          console.log('Test message sent — check your Discord channel.');
          EOF
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
