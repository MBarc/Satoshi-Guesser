name: Test Discord Webhook

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Send test Discord message
        run: |
          node --input-type=module <<'EOF'
          import { toWIF, deriveAddresses } from './src/crypto.js';

          // Private key 1 — the lowest valid key, well-known in Bitcoin circles
          const privKey = new Uint8Array(32);
          privKey[31] = 1;

          const { privKeyHex, addressUncompressed, addressCompressed } = deriveAddresses(privKey);
          const wifCompressed = toWIF(privKey, true);
          const wifUncompressed = toWIF(privKey, false);

          const webhookUrl = process.env.WEBHOOK_URL;
          if (!webhookUrl) { console.error('WEBHOOK_URL secret not set'); process.exit(1); }

          const body = {
            content: '**[TEST] This is what a hit notification looks like**',
            embeds: [{
              color: 0xf7931a,
              fields: [
                { name: 'Address', value: `\`${addressUncompressed}\``, inline: false },
                { name: 'WIF (compressed)', value: `\`${wifCompressed}\``, inline: false },
                { name: 'WIF (uncompressed)', value: `\`${wifUncompressed}\``, inline: false },
                { name: 'Raw hex', value: `\`${privKeyHex}\``, inline: false },
              ],
              footer: { text: 'This is a test using private key #1 — not a real hit.' },
            }],
          };

          const res = await fetch(webhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });

          if (res.ok) {
            console.log('Test message sent successfully');
          } else {
            const text = await res.text();
            console.error(`Failed: ${res.status} ${text}`);
            process.exit(1);
          }
          EOF
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
